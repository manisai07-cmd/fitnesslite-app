version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: mern_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

  backend:
    build: 
      context: ./server
    container_name: mern_backend
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/myfitnesslite
      - PORT=5000
      - JWT_SECRET=${JWT_SECRET:-mysecretkey}
    depends_on:
      - mongodb
    restart: unless-stopped

  frontend:
    build: 
      context: ./client
      args:
        - VITE_API_URL=http://localhost:5000/api
    container_name: mern_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mongodb_data:
